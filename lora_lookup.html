<script>
const K=new Uint32Array([0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2]);
function rotr(x,n){return(x>>>n)|(x<<(32-n));}
function processBlock(H,block){
  const W=new Uint32Array(64),v=new DataView(block.buffer,block.byteOffset,64);
  for(let i=0;i<16;i++)W[i]=v.getUint32(i*4,false);
  for(let i=16;i<64;i++){const s0=rotr(W[i-15],7)^rotr(W[i-15],18)^(W[i-15]>>>3);const s1=rotr(W[i-2],17)^rotr(W[i-2],19)^(W[i-2]>>>10);W[i]=(W[i-16]+s0+W[i-7]+s1)>>>0;}
  let a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
  for(let i=0;i<64;i++){const S1=rotr(e,6)^rotr(e,11)^rotr(e,25);const ch=(e&f)^(~e&g);const t1=(h+S1+ch+K[i]+W[i])>>>0;const S0=rotr(a,2)^rotr(a,13)^rotr(a,22);const maj=(a&b)^(a&c)^(b&c);const t2=(S0+maj)>>>0;h=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b;b=a;a=(t1+t2)>>>0;}
  H[0]=(H[0]+a)>>>0;H[1]=(H[1]+b)>>>0;H[2]=(H[2]+c)>>>0;H[3]=(H[3]+d)>>>0;H[4]=(H[4]+e)>>>0;H[5]=(H[5]+f)>>>0;H[6]=(H[6]+g)>>>0;H[7]=(H[7]+h)>>>0;
}
async function sha256Stream(file,onProgress){
  const H=new Uint32Array([0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19]);
  const CHUNK=2*1024*1024;let leftover=new Uint8Array(0),totalRead=0;const total=file.size;
  for(let offset=0;offset<total;offset+=CHUNK){
    const inc=new Uint8Array(await file.slice(offset,offset+CHUNK).arrayBuffer());
    const merged=new Uint8Array(leftover.length+inc.length);merged.set(leftover);merged.set(inc,leftover.length);leftover=merged;
    totalRead+=inc.length;onProgress(Math.min(99,Math.round(totalRead/total*100)));
    let i=0;for(;i+64<=leftover.length;i+=64)processBlock(H,leftover.subarray(i,i+64));
    leftover=leftover.slice(i);await new Promise(r=>setTimeout(r,0));
  }
  const totalBits=BigInt(total)*8n;
  const pLen=leftover.length+1+(leftover.length%64<56?55-leftover.length%64:119-leftover.length%64)+8;
  const padded=new Uint8Array(pLen);padded.set(leftover);padded[leftover.length]=0x80;
  new DataView(padded.buffer).setBigUint64(pLen-8,totalBits,false);
  for(let i=0;i+64<=padded.length;i+=64)processBlock(H,padded.subarray(i,i+64));
  onProgress(100);
  return Array.from(H).map(n=>n.toString(16).padStart(8,'0')).join('');
}

const TYPE_MAP={
  'LORA':{label:'LoRA',cls:'type-lora'},
  'LoCon':{label:'LyCORIS',cls:'type-lycoris'},
  'Checkpoint':{label:'Checkpoint',cls:'type-checkpoint'},
  'TextualInversion':{label:'Embedding',cls:'type-embedding'},
  'Controlnet':{label:'ControlNet',cls:'type-controlnet'},
  'Hypernetwork':{label:'Hypernetwork',cls:'type-hypernetwork'},
  'AestheticGradient':{label:'Aesthetic',cls:'type-other'},
  'Poses':{label:'Poses',cls:'type-other'},
  'Wildcards':{label:'Wildcards',cls:'type-other'},
  'Workflows':{label:'Workflow',cls:'type-other'},
  'Other':{label:'Other',cls:'type-other'},
};
function guessTypeFromFilename(name){
  const n=name.toLowerCase();
  if(/vae/.test(n))return{label:'VAE (추측)',cls:'type-vae',guess:true};
  if(/upscal|esrgan|realesrgan|swinir/.test(n))return{label:'Upscaler (추측)',cls:'type-upscaler',guess:true};
  if(/detailer|adetailer|yolo/.test(n))return{label:'Detailer (추측)',cls:'type-detailer',guess:true};
  if(/controlnet|control_net|cnet/.test(n))return{label:'ControlNet (추측)',cls:'type-controlnet',guess:true};
  if(/lora|lycoris|locon|loha|lokr/.test(n))return{label:'LoRA (추측)',cls:'type-lora',guess:true};
  if(/embed|ti[-_]|textual/.test(n))return{label:'Embedding (추측)',cls:'type-embedding',guess:true};
  if(/hypernetwork|hypernet/.test(n))return{label:'Hypernetwork (추측)',cls:'type-hypernetwork',guess:true};
  return null;
}
function resolveType(civitaiType,modelName,fileName){
  if(civitaiType){
    const base=TYPE_MAP[civitaiType]||{label:civitaiType,cls:'type-other'};
    const combined=(modelName+fileName).toLowerCase();
    if(civitaiType==='Checkpoint'&&/vae/.test(combined))return{label:'VAE',cls:'type-vae',guess:false};
    if(civitaiType==='Other'&&/upscal|esrgan/.test(combined))return{label:'Upscaler',cls:'type-upscaler',guess:false};
    if(civitaiType==='Other'&&/detailer|yolo/.test(combined))return{label:'Detailer',cls:'type-detailer',guess:false};
    return{...base,guess:false};
  }
  return null;
}

const STOPWORDS=new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with','by','from','as','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','this','that','these','those','use','used','using','can','it','its','if','your','my','our','their','not','no','all','also','than','then','when','where','how','what','which','who','more','less','very','just','only','even','so','too','up','out','about','into','after','before','between','through','during','please','note','model','lora','weight','prompt','quality','high','low','style','image','version','xl','sd','base','recommended','recommend','remove','add','trigger','word','words','negative','positive','fine','good','best','here','some','both','each','other','any','way','make','made','set','need','without','include','included','since','over','under','same','different','new','old','first','last','long','small','large','big','full','single','multiple']);
function extractFromDescription(html){
  if(!html)return[];
  const txt=html.replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/g,' ').replace(/\s+/g,' ').trim();
  const candidates=new Set();
  const chunks=txt.split(/[,\n;]+/);
  for(const chunk of chunks){
    const w=chunk.trim();
    if(!w||w.length>40)continue;
    if((w.match(/ /g)||[]).length>2)continue;
    if(/[\/\\:.?#@]/.test(w))continue;
    if(/^\d+$/.test(w))continue;
    const clean=w.replace(/[^a-zA-Z0-9_\- ]/g,'').trim();
    if(!clean||clean.length<2)continue;
    if(!clean.includes(' ')&&STOPWORDS.has(clean.toLowerCase()))continue;
    if(clean.length<=2)continue;
    candidates.add(clean);
  }
  return[...candidates].slice(0,20);
}

function fmtSize(b){if(b>=1e9)return(b/1e9).toFixed(2)+' GB';if(b>=1e6)return(b/1e6).toFixed(1)+' MB';return(b/1e3).toFixed(0)+' KB';}

function createCard(file,color){
  const id='c'+Date.now()+Math.random().toString(36).slice(2);
  const card=document.createElement('div');card.className='card';
  const header=document.createElement('div');header.className='card-header';
  const icon=document.createElement('div');icon.className='card-icon';icon.style.background=color;icon.textContent=file.name.slice(0,2).toUpperCase();
  const meta=document.createElement('div');meta.className='card-meta';
  const nameEl=document.createElement('div');nameEl.className='card-name';nameEl.title=file.name;nameEl.textContent=file.name;
  const sizeEl=document.createElement('div');sizeEl.className='card-size';sizeEl.textContent=fmtSize(file.size);
  meta.append(nameEl,sizeEl);
  const badge=document.createElement('span');badge.className='badge computing';badge.id='badge_'+id;badge.textContent='해시 계산 중';
  header.append(icon,meta,badge);
  const track=document.createElement('div');track.className='progress-track';
  const fill=document.createElement('div');fill.className='progress-fill';fill.id='pb_'+id;fill.style.background=color;
  track.append(fill);
  const body=document.createElement('div');body.id='body_'+id;
  card.append(header,track,body);
  queue.prepend(card);
  return id;
}

function makeTypeBadge(typeInfo){
  const span=document.createElement('span');
  span.className='type-badge '+typeInfo.cls;
  span.textContent=typeInfo.label;
  if(typeInfo.guess)span.title='파일명 기반 추측 — 실제 유형과 다를 수 있음';
  return span;
}
function makePill(word,isAuto){
  const span=document.createElement('span');
  span.className=isAuto?'pill-auto':'pill';
  span.textContent=word;
  if(isAuto)span.title='description 자동 추출 — 실제 트리거 워드가 아닐 수 있음';
  span.addEventListener('click',()=>{
    navigator.clipboard.writeText(word).then(()=>{const orig=span.textContent;span.textContent='복사됨!';setTimeout(()=>{span.textContent=orig;},800);});
  });
  return span;
}
function makePillsSection(words,isAuto){
  const wrap=document.createElement('div');wrap.className='trigger-section';
  if(isAuto){const lbl=document.createElement('div');lbl.className='source-label auto';lbl.textContent='description 자동 추출 (미검증) · 클릭 복사';wrap.append(lbl);}
  const pills=document.createElement('div');pills.className='pills';
  words.forEach(w=>pills.append(makePill(w,isAuto)));
  wrap.append(pills);return wrap;
}
function makeRow(label,valEl){
  const row=document.createElement('div');row.className='info-row';
  const l=document.createElement('div');l.className='info-label';l.textContent=label;
  const v=document.createElement('div');v.className='info-val';v.append(valEl);
  row.append(l,v);return row;
}

function renderResult(bodyEl,data,hash,fileName){
  const modelName=data.model?.name||'이름 없음';
  const versionName=data.name||'';
  const trainedWords=data.trainedWords||[];
  const baseModel=data.baseModel||'확인 불가';
  const url='https://civitai.com/models/'+data.modelId+'?modelVersionId='+data.id;
  const typeInfo=resolveType(data.model?.type,modelName,fileName);

  // 대표 이미지
  const imageUrl=data.images&&data.images.length>0?data.images[0].url:null;

  // 트리거 워드
  let triggerEl;
  if(trainedWords.length>0){triggerEl=makePillsSection(trainedWords,false);}
  else{
    const extracted=extractFromDescription(data.description||'');
    if(extracted.length>0){triggerEl=makePillsSection(extracted,true);}
    else{const none=document.createElement('span');none.className='pill-none';none.textContent='트리거 워드 없음';triggerEl=none;}
  }

  const divider=document.createElement('div');divider.className='divider';
  bodyEl.append(divider);

  // 이미지 + 정보 래퍼
  const wrap=document.createElement('div');wrap.className='result-wrap';

  // 썸네일
  const thumb=document.createElement('div');thumb.className='result-thumb';
  if(imageUrl){
    const img=document.createElement('img');
    img.src=imageUrl;
    img.alt='preview';
    img.loading='lazy';
    img.onerror=()=>{thumb.innerHTML='<div class="result-thumb-empty">이미지 없음</div>';};
    thumb.append(img);
  } else {
    const empty=document.createElement('div');empty.className='result-thumb-empty';empty.textContent='이미지 없음';
    thumb.append(empty);
  }

  // 정보
  const info=document.createElement('div');info.className='result-info';
  const modelTitle=document.createElement('div');modelTitle.className='result-model';
  const nameText=document.createElement('span');nameText.textContent=modelName;
  modelTitle.append(nameText);
  if(typeInfo)modelTitle.append(makeTypeBadge(typeInfo));
  if(versionName){const v=document.createElement('span');v.className='result-version';v.textContent=versionName;modelTitle.append(v);}

  const hashSpan=document.createElement('span');hashSpan.className='hash-val';hashSpan.textContent=hash.slice(0,32)+'…';
  const link=document.createElement('a');link.className='link-btn';link.href=url;link.target='_blank';
  link.innerHTML='<svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>';
  link.append(document.createTextNode('civitai에서 보기'));

  info.append(modelTitle,makeRow('베이스 모델',document.createTextNode(baseModel)),makeRow('트리거 워드',triggerEl),makeRow('SHA-256',hashSpan),link);
  wrap.append(thumb,info);
  bodyEl.append(wrap);
}

function renderNotFound(bodyEl,hash,fileName){
  const divider=document.createElement('div');divider.className='divider';
  const box=document.createElement('div');box.className='notfound-box';
  const msg=document.createElement('div');msg.className='notfound-msg';msg.textContent='civitai에서 찾을 수 없어. 자작이거나 비공개 모델일 수 있음.';
  const guessed=guessTypeFromFilename(fileName);
  if(guessed){box.append(msg,makeRow('유형 (추측)',makeTypeBadge(guessed)));}
  else{box.append(msg);}
  const row=document.createElement('div');row.className='info-row';
  const l=document.createElement('div');l.className='info-label';l.textContent='SHA-256';
  const v=document.createElement('div');v.className='info-val';
  const s=document.createElement('span');s.className='hash-val';s.textContent=hash.slice(0,48)+'…';
  v.append(s);row.append(l,v);box.append(row);
  bodyEl.append(divider,box);
}

async function processFile(file){
  const color=COLORS[ci%COLORS.length];ci++;
  const id=createCard(file,color);
  const badge=document.getElementById('badge_'+id);
  const pb=document.getElementById('pb_'+id);
  const body=document.getElementById('body_'+id);
  let hash;
  try{hash=await sha256Stream(file,pct=>{pb.style.width=pct+'%';});}
  catch(e){
    badge.textContent='오류';badge.className='badge error';
    const box=document.createElement('div');box.className='notfound-box';
    const msg=document.createElement('div');msg.className='notfound-msg';msg.textContent='해시 계산 실패: '+e.message;
    box.append(msg);body.append(box);return;
  }
  badge.textContent='조회 중';badge.className='badge fetching';
  try{
    const resp=await fetch('https://civitai.com/api/v1/model-versions/by-hash/'+hash);
    if(resp.status===404){badge.textContent='못 찾음';badge.className='badge notfound';renderNotFound(body,hash,file.name);return;}
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    badge.textContent='찾음!';badge.className='badge found';
    renderResult(body,data,hash,file.name);
  }catch(e){
    badge.textContent='오류';badge.className='badge error';
    const box=document.createElement('div');box.className='notfound-box';
    const msg=document.createElement('div');msg.className='notfound-msg';msg.textContent='조회 실패: '+e.message;
    box.append(msg);body.append(box);
  }
}
function handleFiles(files){[...files].forEach(f=>processFile(f));}
</script>
