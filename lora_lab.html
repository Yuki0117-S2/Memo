<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ LoRA Lab</title>
<style>
:root{--bg:#fff;--bg2:#f7f6f3;--bg3:#eeeeee;--text:#1a1a1a;--text2:#555;--text3:#999;--border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.20);--accent:#8888CC;--accent2:#DDAACC;--accent3:#CCAA88;--danger:#BB6688;--purple:#884499;--radius:12px;--radius-sm:8px;--ok:#6AC8B0}
@media(prefers-color-scheme:dark){:root{--bg:#1e1e1e;--bg2:#272727;--bg3:#313131;--text:#f0f0f0;--text2:#aaa;--text3:#666;--border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.22)}}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}button,input,textarea,select{font-family:inherit}#app{width:100%;max-width:1460px;margin:0 auto;padding:1rem 1.25rem 3rem}
header{display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--border);padding-bottom:.75rem;margin-bottom:.75rem;flex-wrap:wrap}.back{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;color:var(--text3);text-decoration:none;border-radius:var(--radius-sm);font-size:18px}.back:hover{background:var(--bg2);color:var(--accent)}.logo{font-size:15px;font-weight:700;color:var(--danger);letter-spacing:-.2px;margin-right:8px}.toolbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex:1}.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:0;background:var(--accent);color:white;border-radius:var(--radius-sm);padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}.btn:hover{opacity:.86}.btn.outline{background:transparent;color:var(--accent);border:.5px solid var(--accent)}.btn.outline:hover{background:var(--accent);color:white;opacity:1}.btn.danger{background:var(--danger)}.btn.ghost{background:var(--bg2);color:var(--text2);border:.5px solid var(--border)}
.split{display:grid;grid-template-columns:250px minmax(430px,1fr) 430px;gap:12px;align-items:start}.panel{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden}.panel-head{padding:11px 13px;border-bottom:.5px solid var(--border);background:var(--bg2);font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;justify-content:space-between;gap:8px}.panel-body{padding:12px}
#drop-zone{border:1px dashed var(--border2);border-radius:var(--radius);padding:22px 14px;text-align:center;background:var(--bg2);color:var(--text3);font-size:12px;line-height:1.65;margin-bottom:12px;transition:.15s;cursor:pointer}#drop-zone.dragover{border-color:var(--danger);color:var(--danger);background:rgba(187,102,136,.08)}.hint{font-size:11px;color:var(--text3);line-height:1.55}.hint strong{color:var(--text2)}
.searchbar{display:flex;align-items:center;gap:7px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;margin-bottom:10px}.searchbar input{flex:1;min-width:0;border:0;background:transparent;outline:0;color:var(--text);font-size:13px}.searchbar button{border:0;background:transparent;color:var(--text3);cursor:pointer;display:none}.searchbar button.visible{display:block}.searchbar button:hover{color:var(--danger)}
.cat-list{display:flex;flex-direction:column;gap:4px;margin:8px 0 12px}.cat{display:flex;align-items:center;justify-content:space-between;gap:8px;border:.5px solid transparent;background:transparent;color:var(--text2);padding:8px 10px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;text-align:left}.cat:hover{background:var(--bg2)}.cat.active{background:var(--danger);color:white}.cat .count{font-size:10px;color:inherit;opacity:.7}.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}.stat{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:9px}.stat b{display:block;font-size:14px;color:var(--danger);margin-bottom:2px}.stat span{font-size:10px;color:var(--text3)}
.sort-row{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap}.sort-row select,.sort-row input{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:12px;padding:6px 8px;outline:0}.sort-row .grow{flex:1;min-width:0}
#select-bar{display:none;align-items:center;gap:8px;padding:8px 12px;margin-bottom:10px;background:var(--danger);color:#fff;border-radius:var(--radius-sm);font-size:13px;flex-wrap:wrap}#select-bar.visible{display:flex}#select-bar button,#select-bar select{background:rgba(255,255,255,.18);color:#fff;border:0;border-radius:4px;padding:4px 9px;font-size:12px;cursor:pointer;outline:0}#select-bar button:hover{background:rgba(255,255,255,.28)}#select-bar select option{color:var(--text);background:var(--bg)}#select-bar .grow{flex:1;min-width:0}#select-bar .count{font-weight:700}
#list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}.card{border:.5px solid var(--border);background:var(--bg);border-radius:var(--radius);padding:12px;cursor:pointer;transition:.12s;position:relative;min-height:152px}.card:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(0,0,0,.06)}.card.active{outline:2px solid var(--danger);outline-offset:-2px}.card.selected{outline:2px solid var(--accent);outline-offset:-2px}.card-title{font-size:13px;font-weight:800;color:var(--text);line-height:1.35;padding-right:28px;word-break:break-all}.card-file{font-size:11px;color:var(--text3);margin-top:3px;word-break:break-all}.card-meta{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0}.pill{font-size:10px;padding:2px 7px;border-radius:999px;background:var(--bg2);border:.5px solid var(--border);color:var(--text2)}.pill.ok{background:rgba(106,200,176,.12);color:var(--ok);border-color:rgba(106,200,176,.32)}.pill.bad{background:rgba(187,102,136,.12);color:var(--danger);border-color:rgba(187,102,136,.28)}.pill.purpose{color:white;background:var(--accent);border-color:var(--accent)}.pill.meta{color:white;background:var(--accent3);border-color:var(--accent3)}.pill.warn{background:rgba(204,170,136,.12);color:var(--accent3);border-color:rgba(204,170,136,.32)}.card-summary{font-size:11px;color:var(--text2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap}.card-quick{display:grid;grid-template-columns:62px 1fr;gap:2px 6px;font-size:10px;line-height:1.45;margin-top:8px}.card-quick b{color:var(--text3)}.card-quick span{color:var(--text2);word-break:break-all}.card-actions{position:absolute;right:6px;top:6px;display:flex;gap:2px}.mini-btn{background:var(--bg2);border:.5px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-size:12px;padding:3px 6px}.mini-btn:hover{color:var(--danger);border-color:var(--danger)}.empty{grid-column:1/-1;text-align:center;color:var(--text3);font-size:13px;padding:4rem 1rem;border:.5px dashed var(--border);border-radius:var(--radius);background:var(--bg2)}
.form-grid{display:grid;gap:9px}.field{display:grid;gap:4px}.field label{font-size:10px;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;font-weight:700}.field input,.field textarea,.field select{width:100%;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:12px;padding:8px 9px;outline:0}.field textarea{resize:vertical;min-height:70px;line-height:1.55}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--danger)}.row{display:flex;gap:7px;align-items:center}.row>*{flex:1}.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.actions .btn{font-size:12px;padding:7px 10px}.small{font-size:11px;color:var(--text3);line-height:1.45}.section-title{font-size:11px;color:var(--danger);font-weight:800;margin:10px 0 3px;border-top:.5px solid var(--border);padding-top:9px;letter-spacing:.4px}.codebox{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-family:Consolas,Menlo,monospace;font-size:10px;color:var(--text2);line-height:1.55;white-space:pre-wrap;word-break:break-word;max-height:240px;overflow:auto}.kv{display:grid;grid-template-columns:116px 1fr;gap:5px 8px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:11px}.kv b{color:var(--text3);font-weight:700}.kv span{color:var(--text2);word-break:break-all}.detail-toggle{background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;padding:2px 6px;line-height:1;border-radius:var(--radius-sm)}.detail-toggle:hover{color:var(--danger);background:var(--bg)}.detail-panel.collapsed .panel-body{display:none}.detail-panel.collapsed .panel-head{border-bottom:0}
#ctx-menu{position:fixed;z-index:9999;background:var(--bg);border:.5px solid var(--border2);border-radius:var(--radius-sm);padding:4px;box-shadow:0 6px 24px rgba(0,0,0,.18);min-width:180px;display:none;font-family:inherit}#ctx-menu.open{display:block}.ctx-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:13px;color:var(--text);border-radius:4px;cursor:pointer;user-select:none}.ctx-item:hover{background:var(--bg2)}.ctx-item.danger{color:var(--danger)}.ctx-icon{font-size:14px;width:18px;text-align:center;display:inline-block;flex-shrink:0}.ctx-sep{height:.5px;background:var(--border);margin:4px 0}
#file-input,#import-input{position:absolute;width:1px;height:1px;padding:0;border:0;clip:rect(0 0 0 0);overflow:hidden;opacity:0;pointer-events:none}.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 13px;border-radius:999px;font-size:12px;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.18);opacity:0;pointer-events:none;transition:.18s}.toast.show{opacity:1}
@media(max-width:1100px){.split{grid-template-columns:230px minmax(360px,1fr)}.detail-panel{grid-column:1/-1}.detail-panel.collapsed{grid-column:auto}}@media(max-width:760px){#app{padding:.75rem .75rem 2rem}header{align-items:flex-start}.toolbar{width:100%}.split{grid-template-columns:1fr}.panel{border-radius:10px}#list{grid-template-columns:1fr}.row{flex-direction:column;gap:9px}.row>*{width:100%}.btn{padding:7px 10px;font-size:12px}.card{min-height:auto}.sort-row select,.sort-row input{flex:1;min-width:120px}.kv{grid-template-columns:96px 1fr}}
</style>
</head>
<body>
<div id="app">
  <header>
    <a class="back" href="index.html" title="작업실로">←</a>
    <div class="logo">✦ LoRA Lab</div>
    <div class="toolbar">
      <button class="btn" id="add-btn">+ 실험 추가</button>
      <button class="btn outline" id="upload-btn">LoRA 올리기</button>
      <button class="btn outline" id="export-btn">JSON 내보내기</button>
      <button class="btn outline" id="import-btn">JSON 불러오기</button>
      <button class="btn ghost" id="select-mode-btn">일괄 선택</button>
      <button class="btn ghost" id="collapse-all-btn">전체 접기</button>
    </div>
  </header>

  <input id="file-input" type="file" multiple accept=".safetensors,.pt,.ckpt,.bin,.json">
  <input id="import-input" type="file" accept="application/json,.json">

  <div class="split">
    <aside class="panel">
      <div class="panel-head">파일 / 필터</div>
      <div class="panel-body">
        <div id="drop-zone">LoRA 파일을 여기에 드롭<br><strong>.safetensors</strong>는 헤더 메타데이터를 읽음<br>원본 파일은 저장하지 않음</div>
        <div class="searchbar"><input id="search" placeholder="이름, trigger, base model, optimizer 검색"><button id="clear-search">×</button></div>
        <div class="small">상태</div><div class="cat-list" id="status-list"></div>
        <div class="small">목적</div><div class="cat-list" id="purpose-list"></div>
        <div class="stats"><div class="stat"><b id="stat-total">0</b><span>전체 카드</span></div><div class="stat"><b id="stat-meta">0</b><span>메타 읽힘</span></div><div class="stat"><b id="stat-success">0</b><span>성공</span></div><div class="stat"><b id="stat-selected">0</b><span>선택</span></div></div>
        <p class="hint" style="margin-top:10px"><strong>더블탭/더블클릭</strong> 또는 우클릭으로 카드 메뉴를 열 수 있음. 모바일은 카드 상세를 접어서 1열로 보기 편하게 맞춤.</p>
      </div>
    </aside>

    <main>
      <div id="select-bar"><span class="count"><span id="selected-count">0</span>개 선택</span><button id="select-all-btn">전체 선택</button><select id="bulk-status"><option value="">상태 변경</option></select><select id="bulk-purpose"><option value="">목적 변경</option></select><button id="bulk-delete">선택 삭제</button><span class="grow"></span><button id="select-off">취소</button></div>
      <div class="sort-row"><select id="sort"><option value="updatedDesc">최근 수정순</option><option value="createdDesc">최근 추가순</option><option value="nameAsc">이름순</option><option value="stepsDesc">steps 높은순</option></select><select id="meta-filter"><option value="all">메타 전체</option><option value="has">메타 있음</option><option value="none">메타 없음</option></select><input class="grow" id="quick-note" placeholder="선택 카드 빠른 메모 추가"></div>
      <div id="list"></div>
    </main>

    <section class="panel detail-panel" id="detail-panel">
      <div class="panel-head"><span>상세 / 실험 노트</span><button class="detail-toggle" id="detail-toggle">접기</button></div>
      <div class="panel-body" id="detail-body"><div class="empty">카드를 선택하면 상세가 열림.</div></div>
    </section>
  </div>
</div>
<div id="ctx-menu"></div><div class="toast" id="toast"></div>
<script>
const STORAGE_KEY='loraLab.v1';
const STATUSES=['계획','학습중','테스트중','성공','실패','보류'];
const PURPOSES=['캐릭터','스타일','의상','그림체','포즈','기타'];
let state={cards:[],selectedId:null,statusFilter:'전체',purposeFilter:'전체',query:'',selectMode:false,selected:new Set(),sort:'updatedDesc',metaFilter:'all'};
const $=id=>document.getElementById(id);
const now=()=>new Date().toISOString();
const fmtBytes=n=>{if(!n)return'';const u=['B','KB','MB','GB'];let i=0,x=n;while(x>=1024&&i<u.length-1){x/=1024;i++}return `${x.toFixed(i?1:0)} ${u[i]}`};
function uid(){return 'lora_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}
function blankCard(extra={}){const t=now();return {id:uid(),title:'새 LoRA 실험',status:'계획',purpose:'기타',fileName:'',fileSize:0,uploadedAt:'',metaRead:false,metaError:'',baseModel:'',datasetCount:'',resolution:'',captionMethod:'',triggerWord:'',repeat:'',epoch:'',totalSteps:'',batchSize:'',learningRate:'',textEncoderLR:'',unetLR:'',optimizer:'',scheduler:'',networkType:'',rankDim:'',alpha:'',weightDecay:'',testPrompt:'',resultReview:'',recommendedWeight:'',nextExperiment:'',notes:'',rawMetadata:{},collapsed:false,createdAt:t,updatedAt:t,...extra}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify({version:1,cards:state.cards}))}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw){const data=JSON.parse(raw);state.cards=(data.cards||[]).map(normalizeCard)}}catch(e){console.warn(e)}}
function normalizeCard(c){return {...blankCard(),...c,selected:false,rawMetadata:c.rawMetadata||{}}}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),1600)}
function escapeHtml(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function compact(v){return String(v??'').trim()}
function toNum(v){const n=parseFloat(String(v??'').replace(/[^0-9.\-]/g,''));return isNaN(n)?0:n}
function updateCard(id,patch){const c=state.cards.find(x=>x.id===id);if(!c)return;Object.assign(c,patch,{updatedAt:now()});save();render()}
function selectedCard(){return state.cards.find(c=>c.id===state.selectedId)}
function metaVal(meta,...keys){for(const k of keys){if(meta[k]!=null&&String(meta[k]).trim()!=='')return meta[k]}return ''}
function parseMaybeJson(v){if(typeof v!=='string')return v;try{return JSON.parse(v)}catch{return v}}
function stringifyShort(v){if(v==null)return'';if(typeof v==='string')return v;if(Array.isArray(v))return v.join(', ');try{return JSON.stringify(v)}catch{return String(v)}}
function inferTrigger(meta){const direct=metaVal(meta,'trigger_word','ss_trigger_word','activation text','activation_text','ss_caption_dropout_tags');if(direct)return stringifyShort(direct);let tf=parseMaybeJson(metaVal(meta,'ss_tag_frequency','ss_dataset_dirs'));
  const counts={};
  function walk(o){if(!o||typeof o!=='object')return;for(const [k,v] of Object.entries(o)){if(typeof v==='number')counts[k]=(counts[k]||0)+v;else if(typeof v==='object')walk(v)}}
  walk(tf);return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([k])=>k).join(', ')
}
function mapMeta(meta,card){return {...card,
  title: card.title || metaVal(meta,'ss_output_name') || card.fileName || 'LoRA',
  baseModel: stringifyShort(metaVal(meta,'ss_base_model_version','ss_sd_model_name','modelspec.title','modelspec.architecture')) || card.baseModel,
  datasetCount: stringifyShort(metaVal(meta,'ss_num_train_images','ss_dataset_dirs')) || card.datasetCount,
  resolution: stringifyShort(metaVal(meta,'ss_resolution','resolution')) || card.resolution,
  captionMethod: stringifyShort(metaVal(meta,'ss_caption_extension','ss_shuffle_caption','ss_keep_tokens','caption_method')) || card.captionMethod,
  triggerWord: inferTrigger(meta) || card.triggerWord,
  repeat: stringifyShort(metaVal(meta,'ss_repeats','ss_dataset_dirs')) || card.repeat,
  epoch: stringifyShort(metaVal(meta,'ss_epoch','ss_num_epochs')) || card.epoch,
  totalSteps: stringifyShort(metaVal(meta,'ss_steps','ss_total_steps','ss_max_train_steps')) || card.totalSteps,
  batchSize: stringifyShort(metaVal(meta,'ss_train_batch_size','ss_batch_size')) || card.batchSize,
  learningRate: stringifyShort(metaVal(meta,'ss_learning_rate','learning_rate')) || card.learningRate,
  textEncoderLR: stringifyShort(metaVal(meta,'ss_text_encoder_lr','text_encoder_lr')) || card.textEncoderLR,
  unetLR: stringifyShort(metaVal(meta,'ss_unet_lr','unet_lr')) || card.unetLR,
  optimizer: stringifyShort(metaVal(meta,'ss_optimizer','optimizer')) || card.optimizer,
  scheduler: stringifyShort(metaVal(meta,'ss_lr_scheduler','scheduler')) || card.scheduler,
  networkType: stringifyShort(metaVal(meta,'ss_network_module','ss_network_type','network_module')) || card.networkType,
  rankDim: stringifyShort(metaVal(meta,'ss_network_dim','network_dim','dim','rank')) || card.rankDim,
  alpha: stringifyShort(metaVal(meta,'ss_network_alpha','network_alpha','alpha')) || card.alpha,
  weightDecay: stringifyShort(metaVal(meta,'ss_optimizer_args','weight_decay')) || card.weightDecay,
  rawMetadata: meta, metaRead:Object.keys(meta).length>0
}}
async function readSafetensorsMetadata(file){const first=await file.slice(0,8).arrayBuffer();if(first.byteLength<8)throw new Error('파일이 너무 작음');const dv=new DataView(first);const len=Number(dv.getBigUint64(0,true));if(!Number.isFinite(len)||len<=0||len>64*1024*1024)throw new Error('safetensors 헤더 길이 이상');const buf=await file.slice(8,8+len).arrayBuffer();const text=new TextDecoder('utf-8').decode(buf);const json=JSON.parse(text);return json.__metadata__||{}}
async function handleFiles(files){let added=0,fail=0;for(const file of files){let c=blankCard({title:file.name.replace(/\.(safetensors|ckpt|pt|bin)$/i,''),fileName:file.name,fileSize:file.size,uploadedAt:now()});if(/\.safetensors$/i.test(file.name)){try{const meta=await readSafetensorsMetadata(file);c=mapMeta(meta,c);if(!c.title||c.title==='LoRA')c.title=file.name.replace(/\.safetensors$/i,'')}catch(e){c.metaError=e.message||String(e);fail++}}else if(/\.json$/i.test(file.name)){try{const txt=await file.text();const meta=JSON.parse(txt);c=mapMeta(meta.__metadata__||meta,c)}catch(e){c.metaError=e.message||String(e);fail++}}else{c.metaError='지원하지 않는 형식: 이름/크기만 저장'}state.cards.unshift(c);added++}if(!state.selectedId&&state.cards[0])state.selectedId=state.cards[0].id;save();render();toast(`${added}개 추가${fail?`, ${fail}개 메타 실패`:''}`)}
function filtered(){let arr=[...state.cards];const q=state.query.trim().toLowerCase();if(q){arr=arr.filter(c=>JSON.stringify(c).toLowerCase().includes(q))}if(state.statusFilter!=='전체')arr=arr.filter(c=>c.status===state.statusFilter);if(state.purposeFilter!=='전체')arr=arr.filter(c=>c.purpose===state.purposeFilter);if(state.metaFilter==='has')arr=arr.filter(c=>c.metaRead);if(state.metaFilter==='none')arr=arr.filter(c=>!c.metaRead);arr.sort((a,b)=>{if(state.sort==='nameAsc')return (a.title||a.fileName).localeCompare(b.title||b.fileName,'ko');if(state.sort==='stepsDesc')return toNum(b.totalSteps)-toNum(a.totalSteps);if(state.sort==='createdDesc')return (b.createdAt||'').localeCompare(a.createdAt||'');return (b.updatedAt||'').localeCompare(a.updatedAt||'')});return arr}
function renderFilters(){const s=$('status-list'),p=$('purpose-list');const count=(key,val)=>val==='전체'?state.cards.length:state.cards.filter(c=>c[key]===val).length;s.innerHTML=['전체',...STATUSES].map(v=>`<button class="cat ${state.statusFilter===v?'active':''}" data-status="${v}"><span>${v}</span><span class="count">${count('status',v)}</span></button>`).join('');p.innerHTML=['전체',...PURPOSES].map(v=>`<button class="cat ${state.purposeFilter===v?'active':''}" data-purpose="${v}"><span>${v}</span><span class="count">${count('purpose',v)}</span></button>`).join('');s.querySelectorAll('[data-status]').forEach(b=>b.onclick=()=>{state.statusFilter=b.dataset.status;render()});p.querySelectorAll('[data-purpose]').forEach(b=>b.onclick=()=>{state.purposeFilter=b.dataset.purpose;render()});}
function statusClass(c){return c.status==='성공'?'ok':c.status==='실패'?'bad':c.status==='보류'?'warn':''}
function cardHtml(c){const meta=c.metaRead?'메타 있음':(c.metaError?'메타 없음':'수동');const collapsed=c.collapsed;return `<article class="card ${state.selectedId===c.id?'active':''} ${state.selected.has(c.id)?'selected':''}" data-id="${c.id}"><div class="card-actions"><button class="mini-btn" data-act="fold">${collapsed?'＋':'－'}</button></div><div class="card-title">${escapeHtml(c.title||c.fileName||'이름 없음')}</div><div class="card-file">${escapeHtml(c.fileName||'수동 기록')} ${c.fileSize?`· ${fmtBytes(c.fileSize)}`:''}</div><div class="card-meta"><span class="pill ${statusClass(c)}">${escapeHtml(c.status)}</span><span class="pill purpose">${escapeHtml(c.purpose)}</span><span class="pill meta">${escapeHtml(meta)}</span>${c.recommendedWeight?`<span class="pill">weight ${escapeHtml(c.recommendedWeight)}</span>`:''}</div>${collapsed?'':`<div class="card-quick"><b>base</b><span>${escapeHtml(c.baseModel||'-')}</span><b>trigger</b><span>${escapeHtml(c.triggerWord||'-')}</span><b>steps</b><span>${escapeHtml(c.totalSteps||'-')}</span><b>LR</b><span>${escapeHtml(c.learningRate||c.unetLR||'-')}</span></div><div class="card-summary">${escapeHtml(c.resultReview||c.nextExperiment||c.notes||c.testPrompt||'아직 평가 메모 없음')}</div>`}</article>`}
function renderList(){const arr=filtered();$('list').classList.toggle('select-mode',state.selectMode);$('list').innerHTML=arr.length?arr.map(cardHtml).join(''):'<div class="empty">조건에 맞는 LoRA 카드가 없음.</div>';$('list').querySelectorAll('.card').forEach(el=>{const id=el.dataset.id;el.onclick=e=>{if(e.target.dataset.act==='fold'){const c=state.cards.find(x=>x.id===id);c.collapsed=!c.collapsed;save();render();return}if(state.selectMode){state.selected.has(id)?state.selected.delete(id):state.selected.add(id);render();return}state.selectedId=id;render()};el.ondblclick=e=>{e.preventDefault();openMenu(id,e.clientX||innerWidth/2,e.clientY||innerHeight/2)};el.oncontextmenu=e=>{e.preventDefault();openMenu(id,e.clientX,e.clientY)}})}
function renderDetail(){const c=selectedCard();const body=$('detail-body');if(!c){body.innerHTML='<div class="empty">카드를 선택하면 상세가 열림.</div>';return}const inp=(key,label,type='text')=>`<div class="field"><label>${label}</label><input data-key="${key}" value="${escapeHtml(c[key])}" type="${type}"></div>`;const area=(key,label)=>`<div class="field"><label>${label}</label><textarea data-key="${key}">${escapeHtml(c[key])}</textarea></div>`;body.innerHTML=`<div class="form-grid"><div class="row">${inp('title','LoRA 이름')}
<div class="field"><label>상태</label><select data-key="status">${STATUSES.map(v=>`<option ${c.status===v?'selected':''}>${v}</option>`).join('')}</select></div><div class="field"><label>목적</label><select data-key="purpose">${PURPOSES.map(v=>`<option ${c.purpose===v?'selected':''}>${v}</option>`).join('')}</select></div></div>
<div class="kv"><b>파일명</b><span>${escapeHtml(c.fileName||'수동 기록')}</span><b>크기</b><span>${escapeHtml(fmtBytes(c.fileSize)||'-')}</span><b>업로드</b><span>${escapeHtml(c.uploadedAt?new Date(c.uploadedAt).toLocaleString():'-')}</span><b>메타</b><span>${c.metaRead?'읽힘':escapeHtml(c.metaError||'없음')}</span></div>
<div class="section-title">학습 세팅</div><div class="row">${inp('baseModel','base model')}${inp('datasetCount','dataset 수')}${inp('resolution','resolution')}</div><div class="row">${inp('captionMethod','caption 방식')}${inp('triggerWord','trigger word')}</div><div class="row">${inp('repeat','repeat')}${inp('epoch','epoch')}${inp('totalSteps','total steps')}${inp('batchSize','batch size')}</div><div class="row">${inp('learningRate','learning rate')}${inp('textEncoderLR','text encoder LR')}${inp('unetLR','unet LR')}</div><div class="row">${inp('optimizer','optimizer')}${inp('scheduler','scheduler')}</div><div class="row">${inp('networkType','network type')}${inp('rankDim','rank/dim')}${inp('alpha','alpha')}${inp('weightDecay','weight decay')}</div>
<div class="section-title">테스트 / 평가</div>${area('testPrompt','테스트 프롬프트')}${area('resultReview','결과 평가')}${inp('recommendedWeight','권장 weight')}${area('nextExperiment','다음 실험 메모')}${area('notes','기타 메모')}
<div class="actions"><button class="btn" id="dup-current">복제</button><button class="btn danger" id="del-current">삭제</button><button class="btn outline" id="copy-meta">메타 복사</button></div><div class="section-title">raw metadata</div><div class="codebox">${escapeHtml(JSON.stringify(c.rawMetadata||{},null,2))}</div></div>`;
body.querySelectorAll('[data-key]').forEach(el=>{el.oninput=()=>updateCard(c.id,{[el.dataset.key]:el.value})});$('dup-current').onclick=()=>duplicateCard(c.id);$('del-current').onclick=()=>deleteCard(c.id);$('copy-meta').onclick=()=>navigator.clipboard?.writeText(JSON.stringify(c.rawMetadata||{},null,2)).then(()=>toast('메타 복사 완료'))}
function renderStats(){const total=state.cards.length;$('stat-total').textContent=total;$('stat-meta').textContent=state.cards.filter(c=>c.metaRead).length;$('stat-success').textContent=state.cards.filter(c=>c.status==='성공').length;$('stat-selected').textContent=state.selected.size;$('selected-count').textContent=state.selected.size;$('select-bar').classList.toggle('visible',state.selectMode);$('clear-search').classList.toggle('visible',!!state.query);}
function renderBulkSelects(){const bs=$('bulk-status'),bp=$('bulk-purpose');if(bs.options.length===1){STATUSES.forEach(v=>bs.add(new Option(v,v)));PURPOSES.forEach(v=>bp.add(new Option(v,v)))}}
function render(){renderFilters();renderBulkSelects();renderList();renderDetail();renderStats();$('search').value=state.query;$('sort').value=state.sort;$('meta-filter').value=state.metaFilter;$('select-mode-btn').textContent=state.selectMode?'선택 종료':'일괄 선택'}
function addManual(){const c=blankCard();state.cards.unshift(c);state.selectedId=c.id;save();render();toast('실험 카드 추가')}
function duplicateCard(id){const c=state.cards.find(x=>x.id===id);if(!c)return;const n=normalizeCard({...c,id:uid(),title:(c.title||'LoRA')+' 복제',createdAt:now(),updatedAt:now()});state.cards.unshift(n);state.selectedId=n.id;save();render();toast('복제 완료')}
function deleteCard(id){if(!confirm('이 카드를 삭제할까?'))return;state.cards=state.cards.filter(c=>c.id!==id);state.selected.delete(id);if(state.selectedId===id)state.selectedId=state.cards[0]?.id||null;save();render();toast('삭제 완료')}
function exportJson(){const data={app:'LoRA Lab',version:1,exportedAt:now(),cards:state.cards};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lora_lab_export.json';a.click();URL.revokeObjectURL(a.href)}
async function importJson(file){try{const data=JSON.parse(await file.text());const cards=(data.cards||Array.isArray(data)&&data||[]).map(normalizeCard);if(!cards.length)throw new Error('cards 없음');state.cards=cards;state.selectedId=cards[0]?.id||null;state.selected.clear();save();render();toast(`${cards.length}개 불러옴`)}catch(e){alert('불러오기 실패: '+(e.message||e))}}
function openMenu(id,x,y){state.selectedId=id;render();const m=$('ctx-menu');m.innerHTML=`<div class="ctx-item" data-a="open"><span class="ctx-icon">✎</span>상세 보기</div><div class="ctx-item" data-a="dup"><span class="ctx-icon">⧉</span>복제</div><div class="ctx-item" data-a="fold"><span class="ctx-icon">⌄</span>상세 접기/펼치기</div><div class="ctx-item" data-a="sel"><span class="ctx-icon">✓</span>선택 토글</div><div class="ctx-sep"></div><div class="ctx-item danger" data-a="del"><span class="ctx-icon">×</span>삭제</div>`;m.classList.add('open');m.style.left='0px';m.style.top='0px';const r=m.getBoundingClientRect();m.style.left=Math.min(x,innerWidth-r.width-8)+'px';m.style.top=Math.min(y,innerHeight-r.height-8)+'px';m.querySelectorAll('.ctx-item').forEach(it=>it.onclick=()=>{const a=it.dataset.a;if(a==='dup')duplicateCard(id);if(a==='del')deleteCard(id);if(a==='fold'){const c=state.cards.find(x=>x.id===id);c.collapsed=!c.collapsed;save();render()}if(a==='sel'){state.selected.has(id)?state.selected.delete(id):state.selected.add(id);state.selectMode=true;render()}if(a==='open'){state.selectedId=id;render()}m.classList.remove('open')})}
function bind(){const dz=$('drop-zone');$('add-btn').onclick=addManual;$('upload-btn').onclick=()=>$('file-input').click();$('file-input').onchange=e=>handleFiles(e.target.files);$('export-btn').onclick=exportJson;$('import-btn').onclick=()=>$('import-input').click();$('import-input').onchange=e=>e.target.files[0]&&importJson(e.target.files[0]);$('search').oninput=e=>{state.query=e.target.value;render()};$('clear-search').onclick=()=>{state.query='';render()};$('sort').onchange=e=>{state.sort=e.target.value;render()};$('meta-filter').onchange=e=>{state.metaFilter=e.target.value;render()};$('select-mode-btn').onclick=()=>{state.selectMode=!state.selectMode;if(!state.selectMode)state.selected.clear();render()};$('select-off').onclick=()=>{state.selectMode=false;state.selected.clear();render()};$('select-all-btn').onclick=()=>{filtered().forEach(c=>state.selected.add(c.id));render()};$('bulk-delete').onclick=()=>{if(!state.selected.size)return;if(confirm(`${state.selected.size}개 삭제할까?`)){state.cards=state.cards.filter(c=>!state.selected.has(c.id));state.selected.clear();state.selectMode=false;state.selectedId=state.cards[0]?.id||null;save();render()}};$('bulk-status').onchange=e=>{if(!e.target.value)return;state.cards.forEach(c=>{if(state.selected.has(c.id)){c.status=e.target.value;c.updatedAt=now()}});e.target.value='';save();render()};$('bulk-purpose').onchange=e=>{if(!e.target.value)return;state.cards.forEach(c=>{if(state.selected.has(c.id)){c.purpose=e.target.value;c.updatedAt=now()}});e.target.value='';save();render()};$('collapse-all-btn').onclick=()=>{const anyOpen=state.cards.some(c=>!c.collapsed);state.cards.forEach(c=>c.collapsed=anyOpen);save();render();toast(anyOpen?'전체 접기':'전체 펼치기')};$('detail-toggle').onclick=()=>{$('detail-panel').classList.toggle('collapsed');$('detail-toggle').textContent=$('detail-panel').classList.contains('collapsed')?'펼치기':'접기'};$('quick-note').onchange=e=>{const c=selectedCard();if(c&&e.target.value.trim()){updateCard(c.id,{notes:(c.notes?c.notes+'\n':'')+e.target.value.trim()});e.target.value='';toast('메모 추가')}};['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('dragover')}));['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('dragover')}));dz.ondrop=e=>handleFiles(e.dataTransfer.files);dz.onclick=()=>$('file-input').click();document.addEventListener('click',e=>{if(!e.target.closest('#ctx-menu'))$('ctx-menu').classList.remove('open')});document.addEventListener('keydown',e=>{if(e.key==='Escape'){$('ctx-menu').classList.remove('open');state.selectMode=false;state.selected.clear();render()}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='n'){e.preventDefault();addManual()}})}
load();bind();render();
</script>
</body>
