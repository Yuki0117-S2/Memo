<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 작업실</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f6f3;
    --text: #1a1a1a;
    --text2: #555;
    --text3: #999;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.18);
    --c1: #8888CC;
    --c2: #BB6688;
    --c3: #DDAACC;
    --c4: #CCAA88;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg2: #232323;
      --text: #f0f0f0;
      --text2: #aaa;
      --text3: #666;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.18);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 4rem 1.5rem 3rem;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  header { margin-bottom: 2.5rem; }
  .star {
    font-size: 32px;
    color: var(--c1);
    line-height: 1;
    letter-spacing: -1px;
  }
  h1 {
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.3px;
    margin-top: 6px;
  }
  .subtitle {
    font-size: 13px;
    color: var(--text3);
    margin-top: 10px;
    font-style: italic;
    line-height: 1.5;
  }
  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 2rem 0 1.25rem;
  }
  .section-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1.8px;
    margin-bottom: 1rem;
    font-weight: 600;
  }
  .apps {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .app {
    position: relative;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 18px 40px 18px 26px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
    display: block;
    overflow: hidden;
  }
  .app:hover {
    border-color: var(--border2);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
  }
  .app::before {
    content: '';
    position: absolute;
    left: 0; top: 14px; bottom: 14px;
    width: 4px;
    border-radius: 0 2px 2px 0;
    background: var(--app-color, var(--c1));
    transition: width 0.18s;
  }
  .app:hover::before {
    width: 6px;
  }
  .app-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.2px;
  }
  .app-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.55;
  }
  .app-meta {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.5px;
    margin-top: 8px;
  }
  .app-arrow {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 16px;
    transition: transform 0.18s, color 0.18s;
  }
  .app:hover .app-arrow {
    color: var(--app-color, var(--c1));
    transform: translateY(-50%) translateX(3px);
  }
  .app.upcoming {
    opacity: 0.55;
    cursor: default;
    background: var(--bg2);
  }
  .app.upcoming:hover {
    transform: none;
    box-shadow: none;
    border-color: var(--border);
  }
  .app.upcoming::before {
    background: var(--text3);
  }
  .app.upcoming:hover::before { width: 4px; }
  .app.upcoming .app-arrow { display: none; }
  footer {
    margin-top: 3.5rem;
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="star">✦</div>
    <h1>작업실</h1>
    <div class="subtitle">도구함과 메모를 모아두는 곳.</div>
  </header>

  <div class="section-label">도구</div>
  <div class="apps">
    <a class="app" href="cd_idea.html" style="--app-color: #8888CC">
      <div class="app-title">CD Idea</div>
      <div class="app-desc">캐릭터 디자인 아이디어 캐디 — 러프 컨셉부터 프롬프트까지</div>
      <div class="app-meta">자유 배치 · 그리드 · 가나다</div>
      <div class="app-arrow">→</div>
    </a>

    <a class="app" href="archive.html" style="--app-color: #DDAACC">
      <div class="app-title">Archive</div>
      <div class="app-desc">JSON · TXT · MD 자료 색인 — 요약, 태그, 미리보기 중심의 가벼운 보관함</div>
      <div class="app-meta">분류 · 검색 · 미리보기 · 백업</div>
      <div class="app-arrow">→</div>
    </a>

    <div class="app upcoming" style="--app-color: #CCAA88">
      <div class="app-title">곧 추가 예정</div>
      <div class="app-desc">새 메모/도구가 여기에 들어올 자리.</div>
    </div>
  </div>

  <footer>✦ 작업실 · 본인 전용</footer>
</div>
</body>
</html>
